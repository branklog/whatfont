<!DOCTYPE html>

rel="stylesheet"

/>

href="https://fonts.cdnfonts.com/css/hey-october"
rel="stylesheet"

<style>

@font-face{
font-family:'Yeonsung';
src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/BMYEONSUNG.woff') format('woff');
}

@font-face{

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#f3f3f3;
--text:#050505;
--sub:#777;
--line:rgba(0,0,0,.08);
--blue:#3155e7;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Pretendard',sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

button,
input{
font-family:'Pretendard',sans-serif;
}

.container{
width:100%;
max-width:1880px;
margin:0 auto;
padding:24px 34px 100px;
}

/* =========================
HEADER
========================= */

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
margin-bottom:24px;
}

/* LEFT */

.header-left{
display:flex;
align-items:center;
gap:24px;
flex:1;
min-width:0;
}

/* LOGO */

.logo{
font-size:42px;
font-weight:900;
letter-spacing:-1px;
white-space:nowrap;
flex-shrink:0;
}

.logo span{
color:var(--blue);
}

/* =========================
NAV
========================= */

.nav{
display:flex;
align-items:center;
gap:18px;

overflow-x:auto;
padding-bottom:4px;

flex:1;
min-width:0;
}

.nav::-webkit-scrollbar{
display:none;
}

.nav-btn{
background:none;
border:none;

font-size:16px;
font-weight:800;

color:#666;

cursor:pointer;

padding-bottom:8px;

position:relative;

white-space:nowrap;
transition:.2s;
flex-shrink:0;
}

.nav-btn:hover{
color:#000;
}

.nav-btn.active{
color:#000;
}

.nav-btn.active::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:100%;
height:2px;
background:var(--blue);
}

/* =========================
SEARCH
픽셀도트 옆
========================= */

.search-box{
position:relative;

width:240px;

flex-shrink:0;

margin-left:6px;
}

.search-input{
width:100%;
height:48px;

background:#fff;

border:1px solid rgba(0,0,0,.08);
border-radius:14px;

padding:0 50px 0 18px;

font-size:14px;

outline:none;
transition:.2s;
}

.search-input:focus{
border-color:var(--blue);
}

.search-icon{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
width:18px;
height:18px;
opacity:.5;
}

/* =========================
RIGHT
========================= */

.header-right{
display:flex;
align-items:center;
margin-left:12px;
flex-shrink:0;
}

/* =========================
MENU BUTTON
========================= */

.menu-btn{
width:48px;
height:48px;

border:none;
border-radius:14px;

background:#fff;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

border:1px solid rgba(0,0,0,.08);

transition:.2s;

position:relative;
z-index:1001;
}

.menu-btn:hover{
border-color:#000;
}

.menu-icon{
display:flex;
flex-direction:column;
gap:4px;
}

.menu-icon span{
display:block;
width:18px;
height:2px;
background:#000;
border-radius:999px;
}

/* =========================
SIDE MENU
========================= */

.side-menu{
position:fixed;
top:0;
right:-340px;

width:320px;
height:100vh;

background:#fff;

padding:34px 30px;

box-shadow:
-20px 0 60px rgba(0,0,0,.08);

transition:.35s ease;

z-index:1000;
}

.side-menu.active{
right:0;
}

.side-title{
font-size:14px;
font-weight:800;
color:#888;
margin-bottom:28px;
letter-spacing:.5px;
}

.side-nav{
display:flex;
flex-direction:column;
gap:22px;
}

.side-link{
font-size:34px;
font-weight:900;
letter-spacing:-2px;
transition:.2s;
}

.side-link:hover{
color:var(--blue);
transform:translateX(6px);
}

/* =========================
OVERLAY
========================= */

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,.2);

opacity:0;
visibility:hidden;

transition:.3s;

z-index:999;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* =========================
HERO
========================= */

.hero{
padding-top:12px;
}

.hero-layout{
display:grid;
grid-template-columns:minmax(0,1fr) 760px;
gap:20px;
align-items:flex-start;
}

/* =========================
LEFT
========================= */

.hero-left{
position:relative;
z-index:2;
}

/* WORD */

.hero-word{
width:100%;
}

.default-text{
font-size:44px;

letter-spacing:0;

line-height:1.1;

white-space:nowrap;

padding-right:0;
}

letter-spacing:-1px;
line-height:1.05;

padding-right:0;

white-space:nowrap;
}

.hero-word .hover-text{
width:100%;
max-width:none;
}


  

/* DEFAULT */

.default-text{
font-size:clamp(84px,7vw,150px);

font-family:'Hey October', cursive;

font-weight:400;
letter-spacing:-4px;
line-height:1.05;

position:relative;
z-index:2;

padding-right:34px;

transition:
opacity .35s ease,
transform .35s ease;
}


  

/* HOVER */

.hover-text{
position:absolute;
left:0;
top:0;

display:flex;
align-items:center;

height:100%;

background:var(--blue);
color:#fff;

padding:0 36px;

font-size:clamp(24px,2vw,38px);
font-weight:900;
letter-spacing:-1px;

white-space:nowrap;

opacity:0;
transform:translateX(-40px);

transition:
opacity .35s ease,
transform .35s ease;

width:auto;
max-width:fit-content;
}

/* EFFECT */

.hero-word:hover .default-text{
opacity:0;
transform:translateX(24px);
}

.hero-word:hover .hover-text{
opacity:1;
transform:translateX(0);
}

/* =========================
RIGHT
========================= */

.hero-right{
position:relative;
height:470px;
margin-top:10px;
}

/* BG TYPO */

.hero-bg{
position:absolute;
right:-30px;
top:-10px;

font-size:230px;
font-weight:900;
line-height:.78;
letter-spacing:-12px;

color:#000;
opacity:.03;

pointer-events:none;
user-select:none;
}

/* =========================
CARD
========================= */

.floating-card{
position:absolute;

background:#fff;

padding:36px 38px;

border-radius:28px;

box-shadow:
0 20px 60px rgba(0,0,0,.06);

border:1px solid rgba(0,0,0,.04);

transition:.3s ease;
}
.floating-card:hover{
transform:
translateY(-6px)
rotate(0deg);
}

.floating-title{
font-size:44px;
font-weight:900;
letter-spacing:-1px;
line-height:1.25;
margin-bottom:14px;

word-break:keep-all;
overflow-wrap:break-word;
}


.floating-desc{
font-size:15px;
line-height:1.7;
font-weight:600;
color:#666;
}

/* CARD POSITION */

.card-paperlogy{
top:10px;
left:40px;
transform:rotate(-5deg);
z-index:2;
}

.card-pretendard{
top:115px;
left:270px;
transform:rotate(4deg);
z-index:4;
}

.card-neo{
top:250px;
left:120px;
transform:rotate(-4deg);
z-index:1;
}

/* =========================
CONTROL
========================= */

.control-section{
display:flex;
flex-direction:column;

/* 기존 26px → 수정 */
margin-top:-22px;
}
  
/* PREVIEW */

.preview-input{
width:420px;
max-width:100%;

height:58px;

background:#fff;

border:1px solid rgba(0,0,0,.08);
border-radius:14px;

padding:0 20px;

font-size:17px;
font-weight:700;
letter-spacing:-0.4px;

outline:none;
transition:.2s;
}

.preview-input:focus{
border-color:var(--blue);
}

.preview-input::placeholder{
color:#aaa;
}

/* FILTER */

.filter-bar{
display:flex;
align-items:center;
gap:24px;

overflow-x:auto;

margin-top:20px;
padding-bottom:6px;
}

.filter-bar::-webkit-scrollbar{
display:none;
}

.filter-btn{
background:none;
border:none;

font-size:17px;
font-weight:800;

color:#777;

cursor:pointer;

white-space:nowrap;

transition:.2s;
flex-shrink:0;
}

.filter-btn:hover{
color:#000;
}

.filter-btn.active{
color:var(--blue);
}

/* =========================
GRID
========================= */

.font-grid{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:16px;

margin-top:44px;
}

/* CARD */

.font-card{
background:#fff;
border:1px solid rgba(0,0,0,.06);

padding:26px;

min-height:280px;

display:flex;
flex-direction:column;
justify-content:space-between;

transition:.25s;
}

.font-card:hover{
transform:translateY(-4px);
border-color:#000;
}

.font-title{
display:inline-block;

font-size:30px;
font-weight:900;
letter-spacing:-1px;

margin-bottom:10px;

transition:.2s;
}

.font-title:hover{
color:var(--blue);
}

.font-maker{
font-size:13px;
font-weight:700;
color:#777;
margin-bottom:34px;
}

.font-preview{
font-size:34px;
line-height:1.35;
letter-spacing:-2px;
word-break:keep-all;
}

.card-footer{
display:flex;
justify-content:space-between;
align-items:center;

margin-top:40px;
padding-top:18px;

border-top:1px solid rgba(0,0,0,.06);
}

.font-weight{
font-size:13px;
font-weight:700;
color:#666;
}

.arrow{
font-size:22px;
}


.font-yeonsung{
font-family:'Yeonsung';
}

.font-gowun{
font-family:'Gowun';
}

.font-ownglyph{
font-family:'Ownglyph';
}
  

/* =========================
TABLET
========================= */

@media(max-width:1400px){

.hero-layout{
grid-template-columns:1fr;
}

.hero-right{
height:420px;
margin-top:30px;
}

.font-grid{
grid-template-columns:repeat(3,minmax(0,1fr));
}

}

/* =========================
MOBILE
========================= */

@media(max-width:900px){
  
.floating-title{
font-size:24px;

line-height:1.3;

letter-spacing:0;
}

}

.header{
display:flex;
flex-wrap:wrap;

align-items:center;
justify-content:space-between;

gap:12px;
}

.header-left{
display:flex;
align-items:center;

width:auto;
gap:12px;
}

.header-right{
width:auto;
margin-left:auto;
}

.nav{
width:100%;

order:3;

padding-bottom:4px;
}

}

.header-right{

}

.hero-layout{

}

.hero-word .hover-text{
width:100%;
max-width:none;
}

padding:0 18px;
}

.hero-right{
display:none;
}
.hero-layout{

}

height:0;

}
  
.hero-bg{

.side-menu{

right:-100%;
}

}

</style>

</head>

<script>

const SUPABASE_URL =
'https://ttunieohxvnhwiikxfzu.supabase.co';

const SUPABASE_ANON_KEY =
'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let fonts = [];


  

const fontGrid =
document.getElementById('fontGrid');

const previewInput =
document.getElementById('previewInput');

const searchInput =
document.getElementById('searchInput');

let currentFilter = '전체';

async function loadFonts(){

const { data, error } =
await client
.from('fonts')
.select('*')
.order('id', { ascending:false });

if(error){

console.log(error);
return;

}

fonts = data;

renderFonts();

}



  
function renderFonts(){

const search =
searchInput.value.toLowerCase();

fontGrid.innerHTML = '';

const filtered =
fonts.filter(font => {

const matchCategory =
currentFilter === '전체'
|| font.category === currentFilter;

const matchSearch =
font.name.toLowerCase().includes(search)
|| (font.designer || '').toLowerCase().includes(search);

return matchCategory && matchSearch;

});

filtered.forEach(font => {

const previewText =
previewInput.value.trim()
|| font.preview_text;

const weightCount = [

font.font_100,
font.font_300,
font.font_500,
font.font_700,
font.font_900

].filter(Boolean).length;

  

fontGrid.innerHTML += `

<a href="result.html?font=${font.id}" class="font-card">

<div>

<div class="font-title">
${font.name}
</div>

<div class="font-maker">
${font.designer || ''}
</div>

<div class="font-preview ${font.className}">
${previewText}
</div>

</div>

<div class="card-footer">

<div class="font-weight">
${weightCount}가지 굵기
</div>

<div class="arrow">
↗
</div>

</div>

</a>

`;

});

}

searchInput.addEventListener(
'input',
renderFonts
);

previewInput.addEventListener(
'input',
renderFonts
);

document
.querySelectorAll('.filter-btn, .nav-btn')
.forEach(button=>{

button.addEventListener('click',()=>{

const filter =
button.dataset.filter;

currentFilter = filter;

document
.querySelectorAll('.filter-btn, .nav-btn')
.forEach(btn=>{

btn.classList.remove('active');

if(btn.dataset.filter === filter){
btn.classList.add('active');
}

});

loadFonts();

});

});

const menuBtn =
document.getElementById('menuBtn');

const sideMenu =
document.getElementById('sideMenu');

const overlay =
document.getElementById('overlay');

menuBtn.addEventListener('click',()=>{

sideMenu.classList.toggle('active');
overlay.classList.toggle('active');

});

overlay.addEventListener('click',()=>{

sideMenu.classList.remove('active');
overlay.classList.remove('active');

});

loadFonts();

</script>
