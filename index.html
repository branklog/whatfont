<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>WhatFont — Korean Font Archive</title>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
/>

<style>

@font-face{
font-family:'Paperlogy';
src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2501-1@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
font-weight:800;
font-style:normal;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#f3f3f3;
--text:#050505;
--sub:#777;
--line:rgba(0,0,0,.08);
--blue:#3155e7;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Pretendard',sans-serif;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

button,
input{
font-family:'Pretendard',sans-serif;
}

.container{
width:100%;
max-width:1880px;
margin:0 auto;
padding:24px 34px 100px;
}

/* =========================
HEADER
========================= */

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
margin-bottom:24px;
}

/* LEFT */

.header-left{
display:flex;
align-items:center;
gap:24px;
flex:1;
min-width:0;
}

/* LOGO */

.logo{
font-size:42px;
font-weight:900;
letter-spacing:-1px;
white-space:nowrap;
flex-shrink:0;
}

.logo span{
color:var(--blue);
}

/* =========================
NAV
========================= */

.nav{
display:flex;
align-items:center;
gap:18px;

overflow-x:auto;
padding-bottom:4px;

flex:1;
min-width:0;
}

.nav::-webkit-scrollbar{
display:none;
}

.nav-btn{
background:none;
border:none;

font-size:16px;
font-weight:800;

color:#666;

cursor:pointer;

padding-bottom:8px;

position:relative;

white-space:nowrap;
transition:.2s;
flex-shrink:0;
}

.nav-btn:hover{
color:#000;
}

.nav-btn.active{
color:#000;
}

.nav-btn.active::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:100%;
height:2px;
background:var(--blue);
}

/* =========================
SEARCH
픽셀도트 옆
========================= */

.search-box{
position:relative;

width:240px;

flex-shrink:0;

margin-left:6px;
}

.search-input{
width:100%;
height:48px;

background:#fff;

border:1px solid rgba(0,0,0,.08);
border-radius:14px;

padding:0 50px 0 18px;

font-size:14px;

outline:none;
transition:.2s;
}

.search-input:focus{
border-color:var(--blue);
}

.search-icon{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
width:18px;
height:18px;
opacity:.5;
}

/* =========================
RIGHT
========================= */

.header-right{
display:flex;
align-items:center;
margin-left:12px;
flex-shrink:0;
}

/* =========================
MENU BUTTON
========================= */

.menu-btn{
width:48px;
height:48px;

border:none;
border-radius:14px;

background:#fff;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

border:1px solid rgba(0,0,0,.08);

transition:.2s;

position:relative;
z-index:1001;
}

.menu-btn:hover{
border-color:#000;
}

.menu-icon{
display:flex;
flex-direction:column;
gap:4px;
}

.menu-icon span{
display:block;
width:18px;
height:2px;
background:#000;
border-radius:999px;
}

/* =========================
SIDE MENU
========================= */

.side-menu{
position:fixed;
top:0;
right:-340px;

width:320px;
height:100vh;

background:#fff;

padding:34px 30px;

box-shadow:
-20px 0 60px rgba(0,0,0,.08);

transition:.35s ease;

z-index:1000;
}

.side-menu.active{
right:0;
}

.side-title{
font-size:14px;
font-weight:800;
color:#888;
margin-bottom:28px;
letter-spacing:.5px;
}

.side-nav{
display:flex;
flex-direction:column;
gap:22px;
}

.side-link{
font-size:34px;
font-weight:900;
letter-spacing:-2px;
transition:.2s;
}

.side-link:hover{
color:var(--blue);
transform:translateX(6px);
}

/* =========================
OVERLAY
========================= */

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,.2);

opacity:0;
visibility:hidden;

transition:.3s;

z-index:999;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* =========================
HERO
========================= */

.hero{
padding-top:12px;
}

.hero-layout{
display:grid;
grid-template-columns:minmax(0,1fr) 760px;
gap:20px;
align-items:flex-start;
}

/* =========================
LEFT
========================= */

.hero-left{
position:relative;
z-index:2;
}

/* WORD */

.hero-word{
position:relative;
display:flex;
align-items:center;

width:100%;

cursor:pointer;

overflow:hidden;

margin-bottom:8px;
}

/* DEFAULT */

.default-text{
font-size:clamp(100px,8vw,178px);
font-weight:900;
letter-spacing:-11px;
line-height:.88;

position:relative;
z-index:2;

padding-right:34px;

transition:
opacity .35s ease,
transform .35s ease;
}

/* HOVER */

.hover-text{
position:absolute;
left:0;
top:0;

display:flex;
align-items:center;

height:100%;

background:var(--blue);
color:#fff;

padding:0 36px;

font-size:clamp(24px,2vw,38px);
font-weight:900;
letter-spacing:-1px;

white-space:nowrap;

opacity:0;
transform:translateX(-40px);

transition:
opacity .35s ease,
transform .35s ease;

width:calc(100vw - 420px);
max-width:1280px;
}

/* EFFECT */

.hero-word:hover .default-text{
opacity:0;
transform:translateX(24px);
}

.hero-word:hover .hover-text{
opacity:1;
transform:translateX(0);
}

/* =========================
RIGHT
========================= */

.hero-right{
position:relative;
height:470px;
margin-top:10px;
}

/* BG TYPO */

.hero-bg{
position:absolute;
right:-30px;
top:-10px;

font-size:230px;
font-weight:900;
line-height:.78;
letter-spacing:-12px;

color:#000;
opacity:.03;

pointer-events:none;
user-select:none;
}

/* =========================
CARD
========================= */

.floating-card{
position:absolute;

background:#fff;

padding:36px 38px;

border-radius:28px;

box-shadow:
0 20px 60px rgba(0,0,0,.06);

border:1px solid rgba(0,0,0,.04);

transition:.3s ease;
}

.floating-card:hover{
transform:
translateY(-6px)
rotate(0deg);
}

.floating-title{
font-size:44px;
font-weight:900;
letter-spacing:-2px;
line-height:1.05;
margin-bottom:14px;
}

.floating-desc{
font-size:15px;
line-height:1.7;
font-weight:600;
color:#666;
}

/* CARD POSITION */

.card-paperlogy{
top:10px;
left:40px;
transform:rotate(-5deg);
z-index:2;
}

.card-pretendard{
top:115px;
left:270px;
transform:rotate(4deg);
z-index:4;
}

.card-neo{
top:250px;
left:120px;
transform:rotate(-4deg);
z-index:1;
}

/* =========================
CONTROL
========================= */

.control-section{
display:flex;
flex-direction:column;

/* 기존 26px → 수정 */
margin-top:-22px;
}
  
/* PREVIEW */

.preview-input{
width:420px;
max-width:100%;

height:58px;

background:#fff;

border:1px solid rgba(0,0,0,.08);
border-radius:14px;

padding:0 20px;

font-size:17px;
font-weight:700;
letter-spacing:-0.4px;

outline:none;
transition:.2s;
}

.preview-input:focus{
border-color:var(--blue);
}

.preview-input::placeholder{
color:#aaa;
}

/* FILTER */

.filter-bar{
display:flex;
align-items:center;
gap:24px;

overflow-x:auto;

margin-top:20px;
padding-bottom:6px;
}

.filter-bar::-webkit-scrollbar{
display:none;
}

.filter-btn{
background:none;
border:none;

font-size:17px;
font-weight:800;

color:#777;

cursor:pointer;

white-space:nowrap;

transition:.2s;
flex-shrink:0;
}

.filter-btn:hover{
color:#000;
}

.filter-btn.active{
color:var(--blue);
}

/* =========================
GRID
========================= */

.font-grid{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:16px;

margin-top:44px;
}

/* CARD */

.font-card{
background:#fff;
border:1px solid rgba(0,0,0,.06);

padding:26px;

min-height:280px;

display:flex;
flex-direction:column;
justify-content:space-between;

transition:.25s;
}

.font-card:hover{
transform:translateY(-4px);
border-color:#000;
}

.font-title{
display:inline-block;

font-size:30px;
font-weight:900;
letter-spacing:-1px;

margin-bottom:10px;

transition:.2s;
}

.font-title:hover{
color:var(--blue);
}

.font-maker{
font-size:13px;
font-weight:700;
color:#777;
margin-bottom:34px;
}

.font-preview{
font-size:34px;
line-height:1.35;
letter-spacing:-2px;
word-break:keep-all;
}

.card-footer{
display:flex;
justify-content:space-between;
align-items:center;

margin-top:40px;
padding-top:18px;

border-top:1px solid rgba(0,0,0,.06);
}

.font-weight{
font-size:13px;
font-weight:700;
color:#666;
}

.arrow{
font-size:22px;
}

.paperlogy{
font-family:'Paperlogy';
}

/* =========================
TABLET
========================= */

@media(max-width:1400px){

.hero-layout{
grid-template-columns:1fr;
}

.hero-right{
height:420px;
margin-top:30px;
}

.font-grid{
grid-template-columns:repeat(3,minmax(0,1fr));
}

}

/* =========================
MOBILE
========================= */

@media(max-width:900px){

.container{
padding:20px 18px 70px;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:18px;
}

.header-left{
width:100%;
flex-direction:column;
align-items:flex-start;
gap:18px;
}

.nav{
width:100%;
}

.search-box{
width:100%;
margin-left:0;
}

.header-right{
width:100%;
justify-content:flex-end;
}

.hero-layout{
display:flex;
flex-direction:column;
gap:24px;
}

.hero-word{
width:max-content;
}

.default-text{
font-size:68px;
letter-spacing:-5px;
line-height:.92;
padding-right:12px;
}

.hero-word .hover-text{
width:100%;
max-width:none;
}

.hover-text{
font-size:18px;
padding:0 18px;
}

.hero-right{
display:grid;
grid-template-columns:1fr;
gap:14px;
height:auto;
margin-top:0;
}

.hero-bg{
display:none;
}

.floating-card{
position:relative !important;
top:auto !important;
left:auto !important;
right:auto !important;
bottom:auto !important;

transform:none !important;

width:100%;
padding:28px;
}

.floating-title{
font-size:32px;
}

.floating-desc{
font-size:14px;
}

.control-section{
margin-top:14px;
}

.preview-input{
width:100%;
height:56px;
font-size:16px;
}

.filter-bar{
gap:18px;
margin-top:18px;
}

.filter-btn{
font-size:15px;
}

.font-grid{
grid-template-columns:1fr;
}

.font-title{
font-size:26px;
}

.font-preview{
font-size:28px;
}

.side-menu{
width:100%;
right:-100%;
}

}

</style>

</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="side-menu" id="sideMenu">

<div class="side-title">
WHATFONT MENU
</div>

<div class="side-nav">

<a href="#" class="side-link">Popular</a>
<a href="#" class="side-link">Latest</a>
<a href="#" class="side-link">Brand</a>
<a href="#" class="side-link">Request</a>
<a href="#" class="side-link">About</a>
<a href="#" class="side-link">Contact</a>

</div>

</div>

<div class="container">

<header class="header">

<div class="header-left">

<a href="index.html" class="logo">
What<span>Font.</span>
</a>

<nav class="nav">

<button class="nav-btn active" data-filter="전체">전체</button>
<button class="nav-btn" data-filter="고딕">고딕</button>
<button class="nav-btn" data-filter="둥근고딕">둥근고딕</button>
<button class="nav-btn" data-filter="명조">명조</button>
<button class="nav-btn" data-filter="손글씨">손글씨</button>
<button class="nav-btn" data-filter="캘리그라피">캘리그라피</button>
<button class="nav-btn" data-filter="붓글씨">붓글씨</button>
<button class="nav-btn" data-filter="레트로">레트로</button>
<button class="nav-btn" data-filter="픽셀도트">픽셀도트</button>

<!-- 검색창 위치 수정 완료 -->

<div class="search-box">

<input
type="text"
class="search-input"
id="searchInput"
placeholder="폰트 검색"
/>

<svg
class="search-icon"
xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
/>

</svg>

</div>

</nav>

</div>

<div class="header-right">

<button class="menu-btn" id="menuBtn">

<div class="menu-icon">
<span></span>
<span></span>
<span></span>
</div>

</button>

</div>

</header>

<section class="hero">

<div class="hero-layout">

<div class="hero-left">

<div class="hero-word">

<div class="default-text">
Korean
</div>

<div class="hover-text">
상업용 무료 폰트 아카이브
</div>

</div>

<div class="hero-word">

<div class="default-text">
Font
</div>

<div class="hover-text">
실시간 폰트 미리보기
</div>

</div>

<div class="hero-word">

<div class="default-text">
Archive
</div>

<div class="hover-text">
1400+ 한글 폰트 탐색
</div>

</div>

</div>

<div class="hero-right">

<div class="hero-bg">
FONT<br>
ARCHIVE
</div>

<a href="result.html?font=paperlogy"
class="floating-card card-paperlogy">

<div class="floating-title paperlogy">
PAPERLOGY
</div>

<div class="floating-desc">
다양한 굵기와 감각적인<br>
현대적인 한글 폰트
</div>

</a>

<a href="result.html?font=pretendard"
class="floating-card card-pretendard">

<div class="floating-title">
Pretendard
</div>

<div class="floating-desc">
국내에서 가장 많이 사용하는<br>
실전형 UI 폰트
</div>

</a>

<a href="result.html?font=neo"
class="floating-card card-neo">

<div class="floating-title">
Neo둥근모
</div>

<div class="floating-desc">
레트로 감성의<br>
픽셀 스타일 폰트
</div>

</a>

</div>

</div>

</section>

<section class="control-section">

<input
type="text"
class="preview-input"
id="previewInput"
placeholder="폰트 미리 써보기"
/>

<div class="filter-bar">

<button class="filter-btn active" data-filter="전체">전체</button>
<button class="filter-btn" data-filter="고딕">고딕</button>
<button class="filter-btn" data-filter="둥근고딕">둥근고딕</button>
<button class="filter-btn" data-filter="명조">명조</button>
<button class="filter-btn" data-filter="손글씨">손글씨</button>
<button class="filter-btn" data-filter="캘리그라피">캘리그라피</button>
<button class="filter-btn" data-filter="붓글씨">붓글씨</button>
<button class="filter-btn" data-filter="레트로">레트로</button>
<button class="filter-btn" data-filter="픽셀도트">픽셀도트</button>

</div>

</section>

<section class="font-grid" id="fontGrid"></section>

</div>

<script>

const fonts = [

{
id:'pretendard',
name:'프리텐다드',
creator:'길형진 (orioncactus)',
category:'고딕',
weights:'9가지 굵기',
preview:'세상에 이런 폰트가 나오다니 천재인듯',
className:''
},

{
id:'paperlogy',
name:'페이퍼로지',
creator:'Freesentation',
category:'둥근고딕',
weights:'7가지 굵기',
preview:'멋진 한글 폰트와 영문 폰트의 조합',
className:'paperlogy'
},

{
id:'gmarket',
name:'G마켓 산스',
creator:'G마켓',
category:'고딕',
weights:'5가지 굵기',
preview:'온라인 쇼핑은 하다 보면 끝이 없지',
className:''
},

{
id:'neo',
name:'Neo둥근모',
creator:'DungGeunMo',
category:'픽셀도트',
weights:'1가지 굵기',
preview:'레트로 감성의 픽셀 스타일 폰트',
className:''
}

];

const fontGrid =
document.getElementById('fontGrid');

const previewInput =
document.getElementById('previewInput');

const searchInput =
document.getElementById('searchInput');

let currentFilter = '전체';

function renderFonts(){

const search =
searchInput.value.toLowerCase();

fontGrid.innerHTML = '';

const filtered =
fonts.filter(font => {

const matchCategory =
currentFilter === '전체'
|| font.category === currentFilter;

const matchSearch =
font.name.toLowerCase().includes(search)
|| font.creator.toLowerCase().includes(search);

return matchCategory && matchSearch;

});

filtered.forEach(font => {

const previewText =
previewInput.value.trim()
|| font.preview;

fontGrid.innerHTML += `

<a href="result.html?font=${font.id}" class="font-card">

<div>

<div class="font-title">
${font.name}
</div>

<div class="font-maker">
${font.creator}
</div>

<div class="font-preview ${font.className}">
${previewText}
</div>

</div>

<div class="card-footer">

<div class="font-weight">
${font.weights}
</div>

<div class="arrow">
↗
</div>

</div>

</a>

`;

});

}

searchInput.addEventListener(
'input',
renderFonts
);

previewInput.addEventListener(
'input',
renderFonts
);

document
.querySelectorAll('.filter-btn, .nav-btn')
.forEach(button=>{

button.addEventListener('click',()=>{

const filter =
button.dataset.filter;

currentFilter = filter;

document
.querySelectorAll('.filter-btn, .nav-btn')
.forEach(btn=>{

btn.classList.remove('active');

if(btn.dataset.filter === filter){
btn.classList.add('active');
}

});

renderFonts();

});

});

const menuBtn =
document.getElementById('menuBtn');

const sideMenu =
document.getElementById('sideMenu');

const overlay =
document.getElementById('overlay');

menuBtn.addEventListener('click',()=>{

sideMenu.classList.toggle('active');
overlay.classList.toggle('active');

});

overlay.addEventListener('click',()=>{

sideMenu.classList.remove('active');
overlay.classList.remove('active');

});

renderFonts();

</script>

</body>
