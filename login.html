<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>WhatFont Admin Login</title>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#f5f5f5;
--text:#111;
--sub:#777;
--line:#e7e7e7;
--blue:#3155e7;
}

body{
background:var(--bg);
font-family:'Pretendard',sans-serif;
color:var(--text);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;
}

input,
button{
font-family:'Pretendard',sans-serif;
}

.login-box{
width:100%;
max-width:460px;

background:#fff;

border:1px solid var(--line);
border-radius:32px;

padding:42px;
}

.logo{
font-size:46px;
font-weight:900;
letter-spacing:-2px;

margin-bottom:12px;
}

.logo span{
color:var(--blue);
}

.desc{
font-size:15px;
line-height:1.7;
color:#666;

margin-bottom:34px;
}

.form{
display:flex;
flex-direction:column;
gap:16px;
}

.input{
width:100%;
height:58px;

background:#fff;

border:1px solid var(--line);
border-radius:16px;

padding:0 18px;

font-size:15px;

outline:none;
transition:.2s;
}

.input:focus{
border-color:var(--blue);
}

.login-btn{
width:100%;
height:58px;

border:none;
border-radius:16px;

background:var(--blue);
color:#fff;

font-size:15px;
font-weight:800;

cursor:pointer;
transition:.2s;
}

.login-btn:hover{
opacity:.92;
}

.message{
margin-top:18px;

font-size:14px;
font-weight:700;

color:#e53935;

display:none;
}

.loading{
opacity:.7;
pointer-events:none;
}

@media(max-width:700px){

.login-box{
padding:30px 24px;
border-radius:24px;
}

.logo{
font-size:38px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
What<span>Font.</span>
</div>

<div class="desc">
관리자 로그인 후 폰트를 등록할 수 있습니다.
</div>

<div class="form">

<input
type="email"
class="input"
id="email"
placeholder="이메일"
/>

<input
type="password"
class="input"
id="password"
placeholder="비밀번호"
/>

<button
class="login-btn"
id="loginBtn">

로그인

</button>

<div
class="message"
id="message">

이메일 또는 비밀번호가 올바르지 않습니다.

</div>

</div>

</div>

<script>

/* =========================
SUPABASE
========================= */

const SUPABASE_URL ='https://ttunieohxvnhwiikxfzu.supabase.co';

const SUPABASE_ANON_KEY =
'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

/* =========================
ELEMENT
========================= */

const email =
document.getElementById('email');

const password =
document.getElementById('password');

const loginBtn =
document.getElementById('loginBtn');

const message =
document.getElementById('message');

/* =========================
LOGIN
========================= */

async function login(){

message.style.display = 'none';

loginBtn.classList.add('loading');
loginBtn.innerText = '로그인 중...';

const { data, error } =
await supabase.auth.signInWithPassword({

email:'cgschool@naver.com',
password:password.value

});

if(error){

message.style.display = 'block';

loginBtn.classList.remove('loading');
loginBtn.innerText = '로그인';

return;

}

/* 로그인 성공 */

location.href = 'admin.html';

}

/* =========================
EVENT
========================= */

loginBtn.addEventListener(
'click',
login
);

password.addEventListener(
'keydown',
(e)=>{

if(e.key === 'Enter'){
login();
}

}
);

/* =========================
ALREADY LOGIN
========================= */

async function checkUser(){

const {
data:{ user }
}
=
await supabase.auth.getUser();

if(user){

location.href = 'admin.html';

}

}

checkUser();

</script>

</body>
</html>
